[pytest]
# pytest 配置
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出格式
addopts = 
    -v
    --tb=short
    --capture=no
    --color=yes
    --maxfail=5
    --durations=10

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 标记
markers =
    slow: 标记为慢速测试
    integration: 集成测试
    unit: 单元测试
    performance: 性能测试
